# Used by GitHub Actions dbt-ci.yml for `dbt parse` only.
# dbt parse does not open a database connection, so these credentials are
# intentionally dummy values — safe to commit.
cemac:
  target: ci
  outputs:
    ci:
      type: postgres
      host: localhost
      port: 5432
      user: ci
      password: ci
      dbname: warehouse
      schema: marts
      threads: 1
