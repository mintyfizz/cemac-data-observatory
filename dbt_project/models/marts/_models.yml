version: 2

models:
  - name: dim_countries
    columns:
      - name: country_code
        tests: [not_null, unique]

  - name: dim_indicators
    columns:
      - name: indicator_code
        tests: [not_null, unique]

  - name: fct_observations
    description: "Fact: country x indicator x year with all dimensional context"
    columns:
      - name: country_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_countries')
                field: country_code
      - name: indicator_code
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_indicators')
                field: indicator_code
      - name: value
        tests: [not_null]

  - name: mart_group_averages_yearly
    columns:
      - name: indicator_code
        tests: [not_null]

  - name: mart_pipeline_health
    description: "One-row public pipeline freshness and coverage summary for dashboard health cards"
    columns:
      - name: last_refresh_at
        tests: [not_null]
      - name: total_observations
        tests: [not_null]
      - name: countries_present
        tests: [not_null]
      - name: indicators_present
        tests: [not_null]

  - name: cemac_digital_readiness
    description: "Dashboard-ready wide table"
    columns:
      - name: country_value
        tests: [not_null]
